name: Benchmark Comparison

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  benchmark-compare:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------------
      # Setup
      # ------------------------------------------------------------------
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-bench-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-bench-
            ${{ runner.os }}-maven-

      # Save the comparison script before switching to base (which may not have it)
      - name: Preserve comparison script
        run: cp .github/scripts/compare-benchmarks.py /tmp/compare-benchmarks.py

      # ------------------------------------------------------------------
      # Run benchmarks on the BASE branch (main)
      # ------------------------------------------------------------------
      - name: Checkout base ref
        run: git checkout ${{ github.event.pull_request.base.sha }}

      - name: Run base benchmarks
        run: |
          mvn -B verify -Pbenchmarks 2>&1 | tee /tmp/benchmark-base-full.log \
            | grep -E '^\[BENCHMARK\]|Tests run:|BUILD' || true
          grep '^\[BENCHMARK\]' /tmp/benchmark-base-full.log > /tmp/base-results.txt 2>/dev/null || true
          echo "::group::Base benchmark results"
          cat /tmp/base-results.txt || true
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # Run benchmarks on the PR HEAD
      # ------------------------------------------------------------------
      - name: Checkout PR head
        run: git checkout ${{ github.event.pull_request.head.sha }}

      - name: Run PR benchmarks
        run: |
          mvn -B verify -Pbenchmarks 2>&1 | tee /tmp/benchmark-pr-full.log \
            | grep -E '^\[BENCHMARK\]|Tests run:|BUILD' || true
          grep '^\[BENCHMARK\]' /tmp/benchmark-pr-full.log > /tmp/pr-results.txt 2>/dev/null || true
          echo "::group::PR benchmark results"
          cat /tmp/pr-results.txt || true
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # Compare results and build Markdown comment
      # ------------------------------------------------------------------
      - name: Compare benchmarks
        id: compare
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 /tmp/compare-benchmarks.py \
            /tmp/base-results.txt /tmp/pr-results.txt \
            > /tmp/benchmark-comment.md
          cat /tmp/benchmark-comment.md

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/benchmark-comment.md
          comment-tag: benchmark-results
